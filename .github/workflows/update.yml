name: Update Free Sub

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build sub
        run: |
          python -c "import build" 2>/dev/null || true
          python build.py
          echo "---"
          ls -la dist/
          echo "---"
          head -20 dist/clash.yaml
          echo "---"
          wc -l dist/clash.yaml

      - name: Force commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -A dist/
          git status
          git diff --cached --quiet && echo "STILL_NO_CHANGE" && exit 0
          git commit -m "chore(sub): auto update $(date -u '+%Y%m%d %H:%M') UTC"
          git push